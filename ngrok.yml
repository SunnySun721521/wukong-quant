# ngrok配置文件

# 自动隧道配置
tunnels:
  web:
    proto: http
    addr: 5006
    bind_tls: true
    inspect: false
    web_addr: 0.0.0.0:4040

# 使用说明：
# 1. 下载ngrok: https://ngrok.com/download
# 2. 注册账号: https://dashboard.ngrok.com/signup
# 3. 获取authtoken: https://dashboard.ngrok.com/get-started/your-authtoken
# 4. 配置authtoken: ngrok config add-authtoken YOUR_AUTHTOKEN
# 5. 启动ngrok: ngrok start --all --config ngrok.yml
# 6. 或者直接运行: ngrok http 5006